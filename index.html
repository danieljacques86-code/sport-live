<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IPTV Player - Player Dourado</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            background: #0f0f0f;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 0;
            overflow: hidden;
            position: relative;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(17, 17, 17, 0.95);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #444;
            z-index: 10;
        }

        header .logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #ffcc00;
        }

        header .title {
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 6px #ffcc00;
        }

        .main-player {
            padding: 15px;
        }

        #video {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
        }

        #lista-categorias {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            max-width: 1200px;
            margin: 0 auto;
            overflow-x: auto;
        }

        .categoria {
            padding: 8px 14px;
            background: #1c1c1c;
            border-radius: 20px;
            border: 1px solid #333;
            white-space: nowrap;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .categoria:hover {
            background: #333;
            color: #ffcc00;
        }

        .categoria.ativa {
            background: #ffcc00;
            color: #111;
        }

        #lista-container {
            padding: 0 15px 15px;
        }

        #lista {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px 0;
        }

        .canal {
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px 10px;
            width: 170px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .canal:hover {
            background: #333;
            transform: scale(1.04);
            box-shadow: 0 0 10px #ffcc00;
        }

        #erro-carregamento {
            padding: 16px 12px;
            background: #220000;
            border: 1px solid #ff3333;
            border-radius: 8px;
            margin: 10px;
            font-size: 15px;
            color: #ffcccc;
        }
    </style>
</head>
<body>

    <!-- Vídeo de fundo -->
    <video id="bg-video" autoplay muted loop>
        <source src="https://cdn.pixabay.com/video/2016/09/13/5192-183786490_large.mp4" type="video/mp4">
        Seu navegador não suporta vídeo.
    </video>
    <div id="overlay"></div>

    <!-- Header tipo app IPTV -->
    <header>
        <img src="https://www.freeiconspng.com/uploads/star-channel-logo-png-1.png" alt="Player Dourado" class="logo">
        <div class="title">🇵🇹 Player Dourado - IPTV Sports</div>
    </header>

    <!-- Player principal -->
    <div class="main-player">
        <video id="video" controls poster="https://www.freeiconspng.com/uploads/black-background-8.png"></video>
    </div>

    <!-- Categorias dinâmicas -->
    <div id="lista-categorias"></div>

    <!-- Lista de canais (abaixo) -->
    <div id="lista-container">
        <div id="erro-carregamento" style="display:none;"></div>
        <div id="lista"></div>
    </div>

    <script>
        // 🔥 LISTA ATUALIZADA DO DROPBOX
        const urlM3U = "https://dl.dropbox.com/scl/fi/nln0qvhqwt6fx0b57zoy2/sportLive.txt?rlkey=qpodxt2auc0wyy46o9qdmto3b&st=iiy0m945&dl=0";

        // URL opcional do EPG
        const urlEPG = "http://epg.pfast5000.com";

        // PLAYER (reconhece HLS/m3u8 e TS)
        function play(url) {
            const video = document.getElementById('video');

            video.src = '';
            video.load();

            if (Hls.isSupported() && /.m3u8$/i.test(url)) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.ERROR, (_, data) => {
                    if (data.fatal) console.error('HLS ERROR:', data);
                });
            } else if (video.canPlayType('application/x-mpegURL') || /.m3u8$/i.test(url)) {
                video.src = url;
            } else {
                video.src = url; // mpegts, etc.
            }

            console.log('EPG:', urlEPG);
        }

        // PARSER M3U COM CATEGORIAS (group-title)
        function parseM3U(text) {
            const linhas = text.split('
');
            const canais = [];
            const grupos = {}; // { "Futebol": [...], "Sports": [...] }
            let canal = {};

            linhas.forEach(linha => {
                linha = linha.trim();

                if (linha.startsWith('#EXTINF')) {
                    // Extrai nome e group-title (se existir)
                    const nomeMatch = linha.match(/,(.+)/);
                    const nome = nomeMatch ? nomeMatch[1].trim() : 'Canal sem nome';

                    // tenta pegar group-title=""
                    const groupMatch = linha.match(/group-title=["']([^"']+)["']/i);
                    const grupo = groupMatch ? groupMatch[1].trim() : 'Sem Categoria';

                    canal = { nome, grupo };
                } else if (linha.startsWith('http')) {
                    canal.url = linha;
                    canais.push(canal);

                    if (!grupos[canal.grupo]) grupos[canal.grupo] = [];
                    grupos[canal.grupo].push(canal);
                }
            });

            return { canais, grupos };
        }

        // CARREGAR LISTA COM TRATAMENTO DE ERRO
        const listaDiv        = document.getElementById('lista');
        const categoriasDiv   = document.getElementById('lista-categorias');
        const msgErro         = document.getElementById('erro-carregamento');

        msgErro.style.display = 'none';

        fetch(urlM3U)
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                return res.text();
            })
            .then(text => {
                const { canais, grupos } = parseM3U(text.trim());

                if (canais.length === 0) {
                    msgErro.innerHTML = 'Lista carregada, mas sem canais válidos. Verifique a URL.';
                    msgErro.style.display = 'block';
                    return;
                }

                // Monta lista de categorias (tabs)
                categoriasDiv.innerHTML = '';
                const gruposList = Object.keys(grupos).sort();

                gruposList.forEach((nomeGrupo, i) => {
                    const div = document.createElement('div');
                    div.className = 'categoria';
                    div.innerText = nomeGrupo;
                    if (i === 0) div.classList.add('ativa');

                    div.onclick = () => {
                        // Remove “ativa” de todos
                        document.querySelectorAll('.categoria').forEach(el => el.classList.remove('ativa'));
                        div.classList.add('ativa');
                        // Exibe canais dessa categoria
                        exibirCanais(grupos[nomeGrupo]);
                    };

                    categoriasDiv.appendChild(div);
                });

                // Exibe primeira categoria
                exibirCanais(grupos[gruposList[0]]);

                function exibirCanais(listaCanais) {
                    listaDiv.innerHTML = '';
                    listaCanais.forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'canal';
                        div.innerText = c.nome;

                        div.onclick = () => {
                            play(c.url);
                        };

                        listaDiv.appendChild(div);
                    });
                }
            })
            .catch(err => {
                msgErro.innerText = 'Erro ao carregar lista: ' + err.message;
                msgErro.style.display = 'block';
                console.error('Erro M3U:', err);
            });
    </script>
</body>
</html>
