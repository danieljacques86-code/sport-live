<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⚽ Sport Live Premium</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  background:url('https://elements-resized.envatousercontent.com/elements-video-cover-images/files/42f5c68d-7442-4a7a-a376-db8d1183b3be/inline_image_preview.jpg?w=500&cf_fit=cover&q=85&format=auto&s=2ccd2e87dd02d608ca92719de65622b4392d194a1c95da122a8114f871ccea68') center/cover no-repeat fixed;
}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65)}
.wrap{position:relative;z-index:2;width:min(95%,980px)}
.player-card{background:rgba(0,0,0,.45);border-radius:22px;padding:16px}
video{width:100%;border-radius:16px;background:#000;min-height:240px}
.info{margin-top:14px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;align-items:center}
.badge{background:#ffd000;color:#000;padding:10px 14px;border-radius:999px;font-weight:700}
.status{font-size:20px;font-weight:700;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="wrap">
  <div class="player-card">
    <video id="video" controls autoplay muted playsinline></video>
    <div class="info">
      <div class="badge">⚽ Sport Live</div>
      <div class="status">Logo vai começar a partida</div>
    </div>
  </div>
</div>
<script>
const DROPBOX_JOGO = 'https://dl.dropbox.com/scl/fi/nln0qvhqwt6fx0b57zoy2/sportLive.txt?rlkey=qpodxt2auc0wyy46o9qdmto3b&st=8ixfgfxq';
const video = document.getElementById('video');
let hls;async function lerArquivo(url){ const res = await fetch(url + '&t=' + Date.now()); return await res.text(); }

function tocar(url){ if(hls) hls.destroy(); if(url.includes('.m3u8') && Hls.isSupported()){ hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); } else { video.src = url; } video.play().catch(()=>{}); }

async function carregarJogo(){ try{ const texto = await lerArquivo(DROPBOX_JOGO); const links = texto.split('\n').map(x=>x.trim()).filter(Boolean); if(links[0]) tocar(links[0]); }catch(e){ console.log('Erro ao carregar Dropbox', e); } }

carregarJogo(); setInterval(carregarJogo, 60000); </script>

</body>
</html>
