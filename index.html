<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IPTV Player PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    color:#fff;
}

/* 🎥 VIDEO DE FUNDO */
#bgVideo {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    opacity:0.25;
}

/* OVERLAY ESCURO */
.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:-1;
}

header {
    background:#111;
    padding:15px;
    text-align:center;
    font-size:20px;
}

/* PLAYER */
video#video {
    width:100%;
    height:300px;
    background:black;
}

/* LISTA */
#lista {
    padding:10px;
}

/* CATEGORIA */
.categoria {
    background:#1a1a1a;
    margin-bottom:10px;
    border-radius:8px;
    overflow:hidden;
}

.cat-titulo {
    padding:12px;
    cursor:pointer;
    font-weight:bold;
    background:#222;
}

.cat-titulo:hover {
    background:#333;
}

.canais {
    display:none;
    padding:10px;
}

/* CANAIS */
.canal {
    background:#2a2a2a;
    margin:5px;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
}

.canal:hover {
    background:#444;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO FUNDO -->
<video id="bgVideo" autoplay muted loop>
    <source src="https://cdn.pixabay.com/video/2016/09/13/5156-183300188_tiny.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<header>📺 IPTV Player PRO</header>

<video id="video" controls></video>

<div id="lista"></div>

<script>

// 🔥 SUA LISTA
const url = "https://dl.dropbox.com/scl/fi/nln0qvhqwt6fx0b57zoy2/sportLive.txt?rlkey=qpodxt2auc0wyy46o9qdmto3b&st=kup5bytz&dl=0";

// PLAYER
function play(url) {
    const video = document.getElementById('video');

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// 🔥 CONVERTER M3U COM CATEGORIA
function parseM3U(text) {
    const linhas = text.split("\n");
    let lista = [];
    let canal = {};

    linhas.forEach(linha => {
        linha = linha.trim();

        if (linha.startsWith("#EXTINF")) {

            const nome = linha.split(",")[1];

            const grupoMatch = linha.match(/group-title="(.*?)"/);
            const grupo = grupoMatch ? grupoMatch[1] : "Outros";

            canal = { nome, grupo };

        } 
        else if (linha.startsWith("http")) {
            canal.url = linha;
            lista.push(canal);
        }
    });

    return lista;
}

// 🔥 ORGANIZAR POR CATEGORIA
function agruparPorCategoria(canais) {
    const grupos = {};

    canais.forEach(c => {
        if (!grupos[c.grupo]) {
            grupos[c.grupo] = [];
        }
        grupos[c.grupo].push(c);
    });

    return grupos;
}

// 🔥 RENDER
fetch(url)
.then(res => res.text())
.then(text => {

    const canais = parseM3U(text);
    const grupos = agruparPorCategoria(canais);

    const listaDiv = document.getElementById("lista");

    Object.keys(grupos).forEach(nomeGrupo => {

        const categoriaDiv = document.createElement("div");
        categoriaDiv.className = "categoria";

        const titulo = document.createElement("div");
        titulo.className = "cat-titulo";
        titulo.innerText = "📂 " + nomeGrupo;

        const canaisDiv = document.createElement("div");
        canaisDiv.className = "canais";

        // Toggle abrir/fechar
        titulo.onclick = () => {
            canaisDiv.style.display = canaisDiv.style.display === "block" ? "none" : "block";
        };

        grupos[nomeGrupo].forEach(c => {
            const div = document.createElement("div");
            div.className = "canal";
            div.innerText = c.nome;

            div.onclick = () => play(c.url);

            canaisDiv.appendChild(div);
        });

        categoriaDiv.appendChild(titulo);
        categoriaDiv.appendChild(canaisDiv);

        listaDiv.appendChild(categoriaDiv);
    });

})
.catch(err => {
    document.body.innerHTML += "<p>Erro ao carregar lista</p>";
});

</script>

</body>
</html>
