<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Dourado Premium</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0b0f;
      --card: rgba(24, 24, 28, 0.92);
      --card-2: rgba(34, 34, 40, 0.95);
      --text: #ffffff;
      --muted: #bbbbbb;
      --gold: #ffcc00;
      --gold-2: #ffdf66;
      --border: rgba(255, 255, 255, 0.08);
      --danger: #ff4d4f;
      --success: #26c281;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.35) saturate(1.1);
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at top right, rgba(255, 204, 0, 0.12), transparent 30%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.82));
      backdrop-filter: blur(2px);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      background: rgba(10, 10, 14, 0.82);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
      background: #111;
      box-shadow: 0 0 18px rgba(255, 204, 0, 0.35);
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text h1 {
      font-size: 18px;
      color: var(--gold);
      text-shadow: 0 0 10px rgba(255, 204, 0, 0.25);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-text p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      padding: 10px 13px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 13px;
      font-weight: 600;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 204, 0, 0.4);
      box-shadow: 0 0 14px rgba(255, 204, 0, 0.12);
    }

    .btn.gold {
      background: linear-gradient(135deg, var(--gold), #ffb800);
      color: #111;
      border-color: #e9c200;
    }

    .btn.active {
      background: linear-gradient(135deg, var(--gold), #ffb800);
      color: #111;
      border-color: #e9c200;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px;
    }

    .player-card {
      background: linear-gradient(180deg, rgba(30, 30, 36, 0.92), rgba(20, 20, 24, 0.94));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    #video {
      width: 100%;
      height: 420px;
      background: #000;
      border-radius: 16px;
      outline: none;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    .player-meta {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    .channel-box {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .channel-box .title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .channel-box .name {
      font-size: 18px;
      font-weight: bold;
      color: var(--gold);
      word-break: break-word;
    }

    .channel-box .sub {
      margin-top: 6px;
      font-size: 12px;
      color: #d3d3d3;
    }

    .player-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toolbar {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      display: grid;
      grid-template-columns: 1.3fr 1fr auto auto;
      gap: 10px;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .input,
    .select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      color: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
      font-size: 14px;
    }

    .input::placeholder {
      color: #c4c4c4;
    }

    .status-bar {
      margin-top: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
      color: #e6e6e6;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-ok { color: #99f0c5; }
    .status-error { color: #ffb3b3; }

    .tabs {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 6px;
      scrollbar-width: thin;
    }

    .tab {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      cursor: pointer;
      white-space: nowrap;
      font-size: 13px;
      transition: 0.2s;
      user-select: none;
    }

    .tab:hover {
      border-color: rgba(255, 204, 0, 0.4);
      color: var(--gold);
    }

    .tab.active {
      background: linear-gradient(135deg, var(--gold), #ffb800);
      color: #111;
      font-weight: bold;
      border-color: #f0c500;
      box-shadow: 0 0 18px rgba(255, 204, 0, 0.18);
    }

    .grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
    }

    .channel-card {
      position: relative;
      background: linear-gradient(180deg, rgba(33,33,39,0.96), rgba(21,21,26,0.96));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      min-height: 148px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.22s ease;
      box-shadow: var(--shadow);
    }

    .channel-card:hover {
      transform: translateY(-3px) scale(1.01);
      border-color: rgba(255, 204, 0, 0.4);
      box-shadow: 0 0 18px rgba(255, 204, 0, 0.12), var(--shadow);
    }

    .channel-card.playing {
      border-color: rgba(255, 204, 0, 0.7);
      box-shadow: 0 0 24px rgba(255, 204, 0, 0.16);
    }

    .channel-card img {
      width: 62px;
      height: 62px;
      object-fit: contain;
      background: #111;
      border-radius: 12px;
      padding: 4px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .channel-name {
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      line-height: 1.35;
      word-break: break-word;
    }

    .channel-group {
      font-size: 12px;
      color: var(--muted);
    }

    .channel-url {
      font-size: 11px;
      color: #9b9b9b;
      word-break: break-all;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .fav-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      border: 0;
      background: rgba(255,255,255,0.08);
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    .fav-btn:hover {
      transform: scale(1.08);
      background: rgba(255,255,255,0.16);
    }

    .fav-btn.active {
      background: rgba(255, 204, 0, 0.18);
      color: var(--gold);
    }

    .empty-state,
    .error-box {
      margin-top: 16px;
      padding: 18px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: #ddd;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .error-box {
      border-color: rgba(255, 77, 79, 0.3);
      background: rgba(70, 0, 0, 0.22);
      color: #ffd6d6;
    }

    .footer-note {
      margin: 18px 0 8px;
      text-align: center;
      font-size: 12px;
      color: #a9a9a9;
    }

    @media (max-width: 980px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .player-meta {
        grid-template-columns: 1fr;
      }

      .player-buttons {
        justify-content: flex-start;
      }

      #video {
        height: 290px;
      }
    }

    @media (max-width: 600px) {
      header {
        padding: 12px;
      }

      .brand-text h1 {
        font-size: 16px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      }

      #video {
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="https://cdn.pixabay.com/video/2016/09/13/5192-183786490_large.mp4" type="video/mp4">
  </video>
  <div id="overlay"></div>

  <header>
    <div class="brand">
      <img src="https://www.freeiconspng.com/uploads/star-channel-logo-png-1.png" alt="Logo">
      <div class="brand-text">
        <h1>🇵🇹 Player Dourado Premium</h1>
        <p>IPTV Sports • HLS • Favoritos • Busca</p>
      </div>
    </div>

    <div class="header-actions">
      <button class="btn" id="btnRecarregar">🔄 Recarregar</button>
      <button class="btn" id="btnFavoritosTopo">⭐ Favoritos</button>
      <button class="btn gold" id="btnFullscreen">⛶ Tela cheia</button>
    </div>
  </header>

  <main class="container">
    <section class="player-card">
      <video id="video" controls playsinline poster="https://www.freeiconspng.com/uploads/black-background-8.png"></video>

      <div class="player-meta">
        <div class="channel-box">
          <div class="title">Canal atual</div>
          <div class="name" id="canalAtual">Nenhum canal selecionado</div>
          <div class="sub" id="canalSub">Aguardando reprodução</div>
        </div>

        <div class="player-buttons">
          <button class="btn" id="btnAbrirExterno">↗ Abrir link</button>
          <button class="btn" id="btnRetry">⟳ Tentar novamente</button>
          <button class="btn" id="btnParar">■ Parar</button>
        </div>
      </div>

      <div class="toolbar">
        <input class="input" id="busca" type="text" placeholder="Buscar canal, grupo ou URL..." />
        <select class="select" id="ordenacao">
          <option value="az">Ordenar: A → Z</option>
          <option value="za">Ordenar: Z → A</option>
        </select>
        <button class="btn" id="btnSomenteFav">⭐ Só favoritos</button>
        <button class="btn" id="btnLimparBusca">✖ Limpar</button>
      </div>

      <div class="status-bar">
        <div id="statusTexto" class="status-ok">Pronto para carregar a lista.</div>
        <div id="statusResumo">0 canais</div>
      </div>
    </section>

    <div id="tabs" class="tabs"></div>
    <div id="erroBox" class="error-box" style="display:none;"></div>
    <div id="lista" class="grid"></div>
    <div id="emptyState" class="empty-state" style="display:none;">Nenhum canal encontrado com esse filtro.</div>

    <div class="footer-note">
      Suporte para listas M3U/TXT com categorias e favoritos salvos localmente.
    </div>
  </main>

  <script>
    const LIST_URLS = [
      "https://dl.dropbox.com/scl/fi/nln0qvhqwt6fx0b57zoy2/sportLive.txt?rlkey=qpodxt2auc0wyy46o9qdmto3b&st=iiy0m945&dl=0",
      "https://www.dropbox.com/scl/fi/nln0qvhqwt6fx0b57zoy2/sportLive.txt?rlkey=qpodxt2auc0wyy46o9qdmto3b&raw=1"
    ];

    const urlEPG = "http://epg.pfast5000.com";

    const STORAGE_KEYS = {
      favoritos: "player_dourado_favoritos",
      categoria: "player_dourado_categoria",
      ultimoCanal: "player_dourado_ultimo_canal",
      somenteFav: "player_dourado_somente_favoritos"
    };

    const video = document.getElementById("video");
    const lista = document.getElementById("lista");
    const tabs = document.getElementById("tabs");
    const erroBox = document.getElementById("erroBox");
    const emptyState = document.getElementById("emptyState");
    const busca = document.getElementById("busca");
    const ordenacao = document.getElementById("ordenacao");
    const statusTexto = document.getElementById("statusTexto");
    const statusResumo = document.getElementById("statusResumo");
    const canalAtual = document.getElementById("canalAtual");
    const canalSub = document.getElementById("canalSub");

    const btnRecarregar = document.getElementById("btnRecarregar");
    const btnFavoritosTopo = document.getElementById("btnFavoritosTopo");
    const btnSomenteFav = document.getElementById("btnSomenteFav");
    const btnLimparBusca = document.getElementById("btnLimparBusca");
    const btnFullscreen = document.getElementById("btnFullscreen");
    const btnRetry = document.getElementById("btnRetry");
    const btnParar = document.getElementById("btnParar");
    const btnAbrirExterno = document.getElementById("btnAbrirExterno");

    let hls = null;
    let canais = [];
    let grupos = {};
    let categoriaAtual = localStorage.getItem(STORAGE_KEYS.categoria) || "TODOS";
    let favoritos = carregarFavoritos();
    let somenteFavoritos = localStorage.getItem(STORAGE_KEYS.somenteFav) === "1";
    let canalAtualObj = null;
    let ultimoLinkTentado = "";

    function setStatus(msg, ok = true) {
      statusTexto.textContent = msg;
      statusTexto.className = ok ? "status-ok" : "status-error";
    }

    function carregarFavoritos() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEYS.favoritos) || "[]");
      } catch {
        return [];
      }
    }

    function salvarFavoritos() {
      localStorage.setItem(STORAGE_KEYS.favoritos, JSON.stringify(favoritos));
    }

    function escaparHtml(str = "") {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isYoutubeUrl(url = "") {
      return /youtube\.com|youtu\.be|music\.youtube\.com/i.test(url);
    }

    function isHlsUrl(url = "") {
      return /\.m3u8(\?|$)/i.test(url);
    }

    function normalizarExtinf(linha) {
      if (linha.startsWith("EXTINF")) return "#" + linha;
      return linha;
    }

    function gerarIdCanal(canal) {
      return btoa(unescape(encodeURIComponent((canal.nome || "") + "|" + (canal.url || "")))).replace(/=/g, "");
    }

    function ehFavorito(canal) {
      return favoritos.includes(canal.id);
    }

    function alternarFavorito(canal) {
      if (ehFavorito(canal)) {
        favoritos = favoritos.filter(id => id !== canal.id);
      } else {
        favoritos.push(canal.id);
      }
      salvarFavoritos();
      atualizarBotoesFavoritos();
      renderizar();
    }

    function atualizarBotoesFavoritos() {
      btnSomenteFav.classList.toggle("active", somenteFavoritos);
      btnFavoritosTopo.classList.toggle("active", somenteFavoritos);
      const texto = somenteFavoritos ? "⭐ Favoritos: ON" : "⭐ Favoritos";
      btnSomenteFav.textContent = somenteFavoritos ? "⭐ Só favoritos: ON" : "⭐ Só favoritos";
      btnFavoritosTopo.textContent = texto;
    }

    function destruirHls() {
      if (hls) {
        try { hls.destroy(); } catch {}
        hls = null;
      }
    }

    function pararPlayer() {
      destruirHls();
      try {
        video.pause();
        video.removeAttribute("src");
        video.load();
      } catch {}
      canalAtualObj = null;
      canalAtual.textContent = "Nenhum canal selecionado";
      canalSub.textContent = "Reprodução parada";
      document.querySelectorAll(".channel-card.playing").forEach(el => el.classList.remove("playing"));
    }

    async function resolverStreamUrl(url) {
      if (/\.url(\?|$)/i.test(url)) {
        const res = await fetch(url);
        if (!res.ok) throw new Error("Falha ao abrir arquivo .url");
        const txt = await res.text();
        const match = txt.match(/(?:^|\n)URL=(https?:\/\/[^\r\n]+)/i);
        if (match && match[1]) return match[1].trim();
      }
      return url;
    }

    async function tocarCanal(canal) {
      try {
        setStatus("Preparando reprodução...", true);
        erroBox.style.display = "none";

        let url = await resolverStreamUrl(canal.url);
        ultimoLinkTentado = url;

        if (isYoutubeUrl(url)) {
          window.open(url, "_blank");
          setStatus("Link do YouTube aberto em nova aba.", true);
          canalAtual.textContent = canal.nome;
          canalSub.textContent = "YouTube aberto externamente";
          return;
        }

        destruirHls();
        video.pause();
        video.removeAttribute("src");
        video.load();

        canalAtualObj = { ...canal, urlResolvida: url };
        localStorage.setItem(STORAGE_KEYS.ultimoCanal, JSON.stringify(canalAtualObj));
        canalAtual.textContent = canal.nome || "Canal sem nome";
        canalSub.textContent = `${canal.grupo || "Sem categoria"} • EPG: ${urlEPG}`;

        document.querySelectorAll(".channel-card.playing").forEach(el => el.classList.remove("playing"));
        const card = document.querySelector(`[data-id="${canal.id}"]`);
        if (card) card.classList.add("playing");

        if (Hls.isSupported() && isHlsUrl(url)) {
          hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true
          });

          hls.loadSource(url);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
            setStatus("Reproduzindo via HLS.", true);
          });

          hls.on(Hls.Events.ERROR, (_, data) => {
            console.error("HLS ERROR:", data);
            if (data.fatal) {
              setStatus("Erro HLS fatal. Tentando modo nativo...", false);
              try {
                destruirHls();
                video.src = url;
                video.play().catch(() => {});
              } catch (e) {
                setStatus("Falha na reprodução.", false);
              }
            }
          });
        } else {
          video.src = url;
          await video.play().catch(() => {});
          setStatus("Reproduzindo canal.", true);
        }
      } catch (err) {
        console.error("Erro ao reproduzir:", err);
        setStatus("Erro ao reproduzir canal.", false);
        erroBox.style.display = "block";
        erroBox.textContent = "Erro ao reproduzir: " + err.message;
      }
    }

    function parseM3U(text) {
      const linhas = text.split(/\r?\n/);
      const canaisTemp = [];
      const gruposTemp = {};
      let canalPendente = null;

      function adicionarCanal(canal) {
        if (!canal || !canal.url) return;

        canal.nome = (canal.nome || "Canal sem nome").trim();
        canal.grupo = (canal.grupo || "Sem Categoria").trim();
        canal.logo = (canal.logo || "").trim();
        canal.id = gerarIdCanal(canal);

        canaisTemp.push(canal);

        if (!gruposTemp[canal.grupo]) gruposTemp[canal.grupo] = [];
        gruposTemp[canal.grupo].push(canal);
      }

      for (let linha of linhas) {
        linha = normalizarExtinf((linha || "").trim());
        if (!linha) continue;

        if (linha.startsWith("#EXTINF")) {
          const groupMatch = linha.match(/group-title=["']([^"']+)["']/i);
          const logoMatch = linha.match(/tvg-logo=["']([^"']+)["']/i);
          const tvgIdMatch = linha.match(/tvg-id=["']([^"']+)["']/i);

          const grupo = groupMatch ? groupMatch[1].trim() : "Sem Categoria";
          const logo = logoMatch ? logoMatch[1].trim() : "";
          const tvgId = tvgIdMatch ? tvgIdMatch[1].trim() : "";

          const inlineUrlMatch = linha.match(/(https?:\/\/\S+)$/i);
          const inlineUrl = inlineUrlMatch ? inlineUrlMatch[1].trim() : null;

          let nome = "Canal sem nome";
          const commaIndex = linha.lastIndexOf(",");
          if (commaIndex !== -1) {
            nome = linha.substring(commaIndex + 1).trim();
            if (inlineUrl) nome = nome.replace(inlineUrl, "").trim();
          }

          canalPendente = { nome, grupo, logo, tvgId };

          if (inlineUrl) {
            canalPendente.url = inlineUrl;
            adicionarCanal(canalPendente);
            canalPendente = null;
          }
        } else if (/^https?:\/\//i.test(linha)) {
          if (canalPendente) {
            canalPendente.url = linha;
            adicionarCanal(canalPendente);
            canalPendente = null;
          }
        }
      }

      return { canais: canaisTemp, grupos: gruposTemp };
    }

    async function buscarTexto(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.text();
    }

    async function carregarLista() {
      setStatus("Carregando lista...", true);
      erroBox.style.display = "none";
      lista.innerHTML = "";
      tabs.innerHTML = "";
      emptyState.style.display = "none";

      let ultimoErro = null;
      let texto = "";

      for (const url of LIST_URLS) {
        try {
          texto = await buscarTexto(url);
          if (texto && texto.trim().length > 20) {
            setStatus("Lista carregada com sucesso.", true);
            break;
          }
        } catch (e) {
          ultimoErro = e;
        }
      }

      if (!texto) {
        setStatus("Falha ao carregar lista.", false);
        erroBox.style.display = "block";
        erroBox.textContent = "Erro ao carregar a lista. " + (ultimoErro ? ultimoErro.message : "");
        statusResumo.textContent = "0 canais";
        return;
      }

      const parsed = parseM3U(texto.trim());
      canais = parsed.canais;
      grupos = parsed.grupos;

      if (!canais.length) {
        setStatus("A lista carregou, mas não foram encontrados canais válidos.", false);
        erroBox.style.display = "block";
        erroBox.textContent = "Lista carregada sem canais válidos.";
        statusResumo.textContent = "0 canais";
        return;
      }

      if (categoriaAtual !== "TODOS" && categoriaAtual !== "FAVORITOS" && !grupos[categoriaAtual]) {
        categoriaAtual = "TODOS";
      }

      montarTabs();
      renderizar();
      restaurarUltimoCanal();
    }

    function montarTabs() {
      tabs.innerHTML = "";

      const abas = [
        { nome: "TODOS", qtd: canais.length },
        { nome: "FAVORITOS", qtd: canais.filter(ehFavorito).length }
      ];

      Object.keys(grupos)
        .sort((a, b) => a.localeCompare(b, "pt-BR"))
        .forEach(grupo => abas.push({ nome: grupo, qtd: grupos[grupo].length }));

      abas.forEach(aba => {
        const el = document.createElement("div");
        el.className = "tab" + (categoriaAtual === aba.nome ? " active" : "");
        el.textContent = `${aba.nome} (${aba.qtd})`;
        el.onclick = () => {
          categoriaAtual = aba.nome;
          localStorage.setItem(STORAGE_KEYS.categoria, categoriaAtual);
          montarTabs();
          renderizar();
        };
        tabs.appendChild(el);
      });
    }

    function aplicarFiltros() {
      let listaFiltrada = [...canais];

      if (categoriaAtual === "FAVORITOS") {
        listaFiltrada = listaFiltrada.filter(ehFavorito);
      } else if (categoriaAtual !== "TODOS") {
        listaFiltrada = listaFiltrada.filter(c => c.grupo === categoriaAtual);
      }

      if (somenteFavoritos) {
        listaFiltrada = listaFiltrada.filter(ehFavorito);
      }

      const termo = busca.value.trim().toLowerCase();
      if (termo) {
        listaFiltrada = listaFiltrada.filter(c =>
          (c.nome || "").toLowerCase().includes(termo) ||
          (c.grupo || "").toLowerCase().includes(termo) ||
          (c.url || "").toLowerCase().includes(termo)
        );
      }

      listaFiltrada.sort((a, b) => {
        const an = (a.nome || "").toLowerCase();
        const bn = (b.nome || "").toLowerCase();
        return ordenacao.value === "za" ? bn.localeCompare(an, "pt-BR") : an.localeCompare(bn, "pt-BR");
      });

      return listaFiltrada;
    }

    function renderizar() {
      atualizarBotoesFavoritos();
      montarTabs();

      const listaFiltrada = aplicarFiltros();
      lista.innerHTML = "";

      statusResumo.textContent = `${listaFiltrada.length} canal(is) exibido(s) • ${canais.length} total`;

      if (!listaFiltrada.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      for (const c of listaFiltrada) {
        const card = document.createElement("div");
        card.className = "channel-card";
        card.dataset.id = c.id;
        if (canalAtualObj && canalAtualObj.id === c.id) card.classList.add("playing");

        const logo = c.logo
          ? `<img src="${escaparHtml(c.logo)}" alt="${escaparHtml(c.nome)}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149852.png'">`
          : `<img src="https://cdn-icons-png.flaticon.com/512/149/149852.png" alt="Canal">`;

        card.innerHTML = `
          <button class="fav-btn ${ehFavorito(c) ? "active" : ""}" title="Favorito">${ehFavorito(c) ? "★" : "☆"}</button>
          ${logo}
          <div class="channel-name">${escaparHtml(c.nome)}</div>
          <div class="channel-group">${escaparHtml(c.grupo)}</div>
          <div class="channel-url">${escaparHtml(c.url)}</div>
        `;

        const favBtn = card.querySelector(".fav-btn");
        favBtn.onclick = (e) => {
          e.stopPropagation();
          alternarFavorito(c);
        };

        card.onclick = () => tocarCanal(c);
        lista.appendChild(card);
      }
    }

    function restaurarUltimoCanal() {
      try {
        const salvo = JSON.parse(localStorage.getItem(STORAGE_KEYS.ultimoCanal) || "null");
        if (!salvo || !salvo.id) return;

        const encontrado = canais.find(c => c.id === salvo.id);
        if (encontrado) {
          canalAtual.textContent = encontrado.nome;
          canalSub.textContent = `${encontrado.grupo || "Sem categoria"} • Último canal selecionado`;
          canalAtualObj = encontrado;
        }
      } catch {}
    }

    function abrirExterno() {
      if (!canalAtualObj) return;
      const url = canalAtualObj.urlResolvida || canalAtualObj.url;
      if (url) window.open(url, "_blank");
    }

    function retryUltimoCanal() {
      if (canalAtualObj) tocarCanal(canalAtualObj);
    }

    async function toggleFullscreen() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await video.requestFullscreen();
        }
      } catch (e) {
        console.warn("Fullscreen não disponível:", e);
      }
    }

    busca.addEventListener("input", renderizar);
    ordenacao.addEventListener("change", renderizar);

    btnLimparBusca.onclick = () => {
      busca.value = "";
      renderizar();
    };

    btnSomenteFav.onclick = () => {
      somenteFavoritos = !somenteFavoritos;
      localStorage.setItem(STORAGE_KEYS.somenteFav, somenteFavoritos ? "1" : "0");
      renderizar();
    };

    btnFavoritosTopo.onclick = () => {
      somenteFavoritos = !somenteFavoritos;
      localStorage.setItem(STORAGE_KEYS.somenteFav, somenteFavoritos ? "1" : "0");
      renderizar();
    };

    btnRecarregar.onclick = carregarLista;
    btnParar.onclick = pararPlayer;
    btnRetry.onclick = retryUltimoCanal;
    btnAbrirExterno.onclick = abrirExterno;
    btnFullscreen.onclick = toggleFullscreen;

    video.addEventListener("error", () => {
      setStatus("Erro no elemento de vídeo.", false);
    });

    video.addEventListener("playing", () => {
      setStatus("Canal em reprodução.", true);
    });

    video.addEventListener("waiting", () => {
      setStatus("Carregando buffer...", true);
    });

    atualizarBotoesFavoritos();
    carregarLista();
  </script>
</body>
</html>
