<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IPTV PRO REAL</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0a2a5e;
    color:#fff;
}

/* HOME */
#home {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.menu {
    display:flex;
    gap:20px;
}

.card {
    width:180px;
    height:120px;
    border:2px solid rgba(255,255,255,0.4);
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

/* PLAYER */
#playerScreen {
    display:none;
    height:100vh;
}

.container {
    display:flex;
    height:100%;
}

.sidebar {
    width:300px;
    background:#111;
    overflow:auto;
}

.player {
    flex:1;
}

video {
    width:100%;
    height:100%;
    background:black;
}

.canal {
    padding:10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.canal:hover {
    background:#333;
}

.categoria {
    background:#222;
    padding:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
    <div class="menu">
        <div class="card" onclick="abrirLive()">📺 LIVE TV</div>
    </div>
</div>

<!-- PLAYER -->
<div id="playerScreen">
    <div class="container">
        <div class="sidebar" id="lista"></div>
        <div class="player">
            <video id="video" controls></video>
        </div>
    </div>
</div>

<script>

// 🔥 COLOQUE SEUS DADOS AQUI
const server = "http://SEU_SERVIDOR:80";
const user = "SEU_USUARIO";
const pass = "SUA_SENHA";

// NAV
function abrirLive(){
    document.getElementById("home").style.display="none";
    document.getElementById("playerScreen").style.display="block";
    carregarCategorias();
}

// PLAYER
function play(url){
    const video = document.getElementById("video");

    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// CARREGAR CATEGORIAS
function carregarCategorias(){

fetch(`${server}/player_api.php?username=${user}&password=${pass}&action=get_live_categories`)
.then(r=>r.json())
.then(categorias=>{

    const lista = document.getElementById("lista");
    lista.innerHTML="";

    categorias.forEach(cat=>{

        const div = document.createElement("div");
        div.className="categoria";
        div.innerText = cat.category_name;

        div.onclick = ()=> carregarCanais(cat.category_id);

        lista.appendChild(div);
    });

});
}

// CARREGAR CANAIS
function carregarCanais(catId){

fetch(`${server}/player_api.php?username=${user}&password=${pass}&action=get_live_streams&category_id=${catId}`)
.then(r=>r.json())
.then(canais=>{

    const lista = document.getElementById("lista");
    lista.innerHTML="";

    canais.forEach(c=>{

        const urlStream = `${server}/live/${user}/${pass}/${c.stream_id}.m3u8`;

        const div = document.createElement("div");
        div.className="canal";
        div.innerText = c.name;

        div.onclick = ()=> play(urlStream);

        lista.appendChild(div);
    });

});
}

</script>

</body>
</html>
