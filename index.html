<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IPTV PRO REAL</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

.container {
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar {
    width:300px;
    background:#111;
    overflow:auto;
}

/* PLAYER */
.player {
    flex:1;
}

video {
    width:100%;
    height:100%;
    background:black;
}

/* CATEGORIA */
.cat {
    padding:10px;
    background:#222;
    cursor:pointer;
}

/* CANAL */
.canal {
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.canal img {
    width:35px;
    height:35px;
    background:#000;
    border-radius:5px;
}

.canal:hover {
    background:#333;
}
</style>
</head>

<body>

<div class="container">
    <div class="sidebar" id="lista"></div>

    <div class="player">
        <video id="video" controls></video>
    </div>
</div>

<script>

// 🔥 SEU LINK (COM PROXY PRA FUNCIONAR NO GITHUB)
const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent("http://simweb.top/get.php?username=guu49779&password=d33282wzp&type=ssiptv");

// PLAYER
function play(url){
    const video = document.getElementById("video");

    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// PARSE M3U
function parseM3U(text){
    const linhas = text.split("\n");
    let lista = [];
    let canal = {};

    linhas.forEach(linha => {
        linha = linha.trim();

        if(linha.startsWith("#EXTINF")){
            const nome = linha.split(",")[1];

            const grupo = (linha.match(/group-title="(.*?)"/)||[])[1] || "Canais";
            const logo = (linha.match(/tvg-logo="(.*?)"/)||[])[1] || "";

            canal = {nome, grupo, logo};
        }

        else if(linha.startsWith("http")){
            canal.url = linha;
            lista.push(canal);
        }
    });

    return lista;
}

// AGRUPAR
function agrupar(lista){
    const grupos = {};

    lista.forEach(c=>{
        if(!grupos[c.grupo]) grupos[c.grupo]=[];
        grupos[c.grupo].push(c);
    });

    return grupos;
}

// RENDER
function render(lista){

    const grupos = agrupar(lista);
    const div = document.getElementById("lista");
    div.innerHTML="";

    Object.keys(grupos).forEach(g=>{

        const cat = document.createElement("div");
        cat.className="cat";
        cat.innerText = "📂 " + g;

        const box = document.createElement("div");
        box.style.display="none";

        cat.onclick = ()=>{
            box.style.display = box.style.display==="block"?"none":"block";
        };

        grupos[g].forEach(c=>{

            const item = document.createElement("div");
            item.className="canal";

            item.innerHTML = `
                <img src="${c.logo || 'https://via.placeholder.com/40'}">
                <span>${c.nome}</span>
            `;

            item.onclick = ()=> play(c.url);

            box.appendChild(item);
        });

        div.appendChild(cat);
        div.appendChild(box);
    });
}

// CARREGAR
fetch(url)
.then(r=>r.text())
.then(t=>{
    const canais = parseM3U(t);
    render(canais);
})
.catch(()=>{
    document.getElementById("lista").innerHTML="Erro ao carregar lista";
});

</script>

</body>
</html>
