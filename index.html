<script>

const url = "https://dl.dropbox.com/scl/fi/nln0qvhqwt6fx0b57zoy2/sportLive.txt?dl=0";

// PLAYER
function play(url) {
    const video = document.getElementById('video');

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// PARSE M3U COM CATEGORIA
function parseM3U(text) {
    const linhas = text.split("\n");
    let lista = [];
    let canal = {};

    linhas.forEach(linha => {
        linha = linha.trim();

        if (linha.startsWith("#EXTINF")) {

            const nome = linha.split(",")[1];

            const grupo = (linha.match(/group-title="(.*?)"/) || [])[1] || "Canais";
            const logo = (linha.match(/tvg-logo="(.*?)"/) || [])[1] || "";

            canal = { nome, grupo, logo };

        } 
        else if (linha.startsWith("http")) {
            canal.url = linha;
            lista.push(canal);
        }
    });

    return lista;
}

// AGRUPAR
function agrupar(canais) {
    const grupos = {};

    canais.forEach(c => {
        if (!grupos[c.grupo]) grupos[c.grupo] = [];
        grupos[c.grupo].push(c);
    });

    return grupos;
}

// RENDER LISTA (CORRIGIDO)
function render(canais) {

    const sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = "";

    const grupos = agrupar(canais);

    Object.keys(grupos).forEach(nomeGrupo => {

        // TÍTULO
        const titulo = document.createElement("div");
        titulo.style.padding = "10px";
        titulo.style.background = "#222";
        titulo.style.cursor = "pointer";
        titulo.innerText = "📂 " + nomeGrupo;

        // CONTAINER CANAIS
        const canaisDiv = document.createElement("div");
        canaisDiv.style.display = "none";

        // 🔥 TOGGLE FUNCIONANDO
        titulo.onclick = () => {
            canaisDiv.style.display =
                canaisDiv.style.display === "block" ? "none" : "block";
        };

        // CANAIS
        grupos[nomeGrupo].forEach(c => {
            const div = document.createElement("div");

            div.style.padding = "8px";
            div.style.cursor = "pointer";
            div.style.borderBottom = "1px solid #333";

            div.innerHTML = `
                <img src="${c.logo || 'https://via.placeholder.com/30'}" width="30" style="vertical-align:middle;margin-right:8px;">
                ${c.nome}
            `;

            div.onclick = () => play(c.url);

            canaisDiv.appendChild(div);
        });

        sidebar.appendChild(titulo);
        sidebar.appendChild(canaisDiv);
    });
}

// CARREGAR
fetch(url)
.then(res => res.text())
.then(text => {
    const canais = parseM3U(text);
    render(canais);
})
.catch(() => {
    document.getElementById("sidebar").innerHTML = "Erro ao carregar lista";
});

</script>
