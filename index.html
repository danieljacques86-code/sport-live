<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IPTV Player PRO+</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    color:#fff;
}

/* VIDEO FUNDO */
#bgVideo {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    opacity:0.25;
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:-1;
}

header {
    background:#111;
    padding:15px;
    text-align:center;
    font-size:20px;
}

/* BUSCA */
#busca {
    width:95%;
    margin:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

/* PLAYER */
video#video {
    width:100%;
    height:300px;
    background:black;
}

/* CATEGORIA */
.categoria {
    margin:10px;
    border-radius:8px;
    background:#1a1a1a;
}

.cat-titulo {
    padding:12px;
    background:#222;
    cursor:pointer;
    font-weight:bold;
}

.canais {
    display:none;
    padding:10px;
}

/* CANAL */
.canal {
    display:flex;
    align-items:center;
    gap:10px;
    background:#2a2a2a;
    margin:5px;
    padding:8px;
    border-radius:6px;
    cursor:pointer;
}

.canal img {
    width:40px;
    height:40px;
    object-fit:contain;
    background:#000;
    border-radius:5px;
}

.canal:hover {
    background:#444;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop>
<source src="https://cdn.pixabay.com/video/2016/09/13/5156-183300188_tiny.mp4">
</video>

<div class="overlay"></div>

<header>📺 IPTV Player PRO+</header>

<input type="text" id="busca" placeholder="🔍 Buscar canal...">

<video id="video" controls></video>

<div id="lista"></div>

<script>

const url = "https://dl.dropbox.com/scl/fi/nln0qvhqwt6fx0b57zoy2/sportLive.txt?rlkey=qpodxt2auc0wyy46o9qdmto3b&st=kup5bytz&dl=0";

let canaisGlobais = [];

// PLAYER
function play(url) {
    const video = document.getElementById('video');

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// PARSE M3U
function parseM3U(text) {
    const linhas = text.split("\n");
    let lista = [];
    let canal = {};

    linhas.forEach(linha => {
        linha = linha.trim();

        if (linha.startsWith("#EXTINF")) {

            const nome = linha.split(",")[1];

            const grupo = (linha.match(/group-title="(.*?)"/) || [])[1] || "Outros";
            const logo = (linha.match(/tvg-logo="(.*?)"/) || [])[1] || "";

            canal = { nome, grupo, logo };

        } 
        else if (linha.startsWith("http")) {
            canal.url = linha;
            lista.push(canal);
        }
    });

    return lista;
}

// AGRUPAR
function agrupar(canais) {
    const grupos = {};
    canais.forEach(c => {
        if (!grupos[c.grupo]) grupos[c.grupo] = [];
        grupos[c.grupo].push(c);
    });
    return grupos;
}

// RENDER
function render(canais) {

    const listaDiv = document.getElementById("lista");
    listaDiv.innerHTML = "";

    const grupos = agrupar(canais);

    Object.keys(grupos).forEach(nomeGrupo => {

        const cat = document.createElement("div");
        cat.className = "categoria";

        const titulo = document.createElement("div");
        titulo.className = "cat-titulo";
        titulo.innerText = "📂 " + nomeGrupo;

        const canaisDiv = document.createElement("div");
        canaisDiv.className = "canais";

        titulo.onclick = () => {
            canaisDiv.style.display = canaisDiv.style.display === "block" ? "none" : "block";
        };

        grupos[nomeGrupo].forEach(c => {

            const div = document.createElement("div");
            div.className = "canal";

            div.innerHTML = `
                <img src="${c.logo || 'https://via.placeholder.com/40'}">
                <span>${c.nome}</span>
            `;

            div.onclick = () => play(c.url);

            canaisDiv.appendChild(div);
        });

        cat.appendChild(titulo);
        cat.appendChild(canaisDiv);
        listaDiv.appendChild(cat);
    });
}

// BUSCA
document.getElementById("busca").addEventListener("input", function() {
    const termo = this.value.toLowerCase();

    const filtrados = canaisGlobais.filter(c =>
        c.nome.toLowerCase().includes(termo)
    );

    render(filtrados);
});

// CARREGAR
fetch(url)
.then(res => res.text())
.then(text => {
    canaisGlobais = parseM3U(text);
    render(canaisGlobais);
});

</script>

</body>
</html>
