<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IPTV PRO COMPLETO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0a2a5e;
    color:#fff;
}

/* HOME */
#home {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.logo {
    font-size:35px;
    margin-bottom:40px;
}

.menu {
    display:flex;
    gap:20px;
}

.card {
    width:180px;
    height:120px;
    border:2px solid rgba(255,255,255,0.4);
    border-radius:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    background:rgba(255,255,255,0.1);
    transform:scale(1.05);
}

/* PLAYER SCREEN */
#playerScreen {
    display:none;
    height:100vh;
}

.container {
    display:flex;
    height:100%;
}

/* SIDEBAR ESQUERDA */
.sidebar {
    width:300px;
    background:#111;
    overflow-y:auto;
    transition:0.3s;
}

.sidebar.hidden {
    width:80px;
}

/* PLAYER */
.player-area {
    flex:1;
}

video {
    width:100%;
    height:100%;
    background:black;
}

/* BOTÃO VOLTAR */
.voltar {
    position:absolute;
    top:10px;
    left:10px;
    background:#000;
    padding:10px;
    cursor:pointer;
    z-index:10;
}

/* CATEGORIA */
.cat-titulo {
    padding:10px;
    background:#222;
    cursor:pointer;
    font-weight:bold;
}

/* CANAIS */
.canal {
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.canal img {
    width:35px;
    height:35px;
    background:#000;
    border-radius:5px;
}

.canal:hover {
    background:#333;
}

/* ESCONDE TEXTO NO MINI */
.sidebar.hidden .canal span {
    display:none;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
    <div class="logo">▶ IPTV PRO</div>

    <div class="menu">
        <div class="card" onclick="abrirLive()">📺 LIVE TV</div>
        <div class="card">🧾 EPG</div>
        <div class="card">🎬 VOD</div>
        <div class="card">📺 SERIES</div>
    </div>
</div>

<!-- PLAYER -->
<div id="playerScreen">

    <div class="voltar" onclick="voltarHome()">⬅ VOLTAR</div>

    <div class="container">

        <div class="sidebar" id="sidebar"></div>

        <div class="player-area">
            <video id="video" controls></video>
        </div>

    </div>

</div>

<script>

const url = "https://dl.dropbox.com/scl/fi/nln0qvhqwt6fx0b57zoy2/sportLive.txt?dl=0";

// NAV
function abrirLive() {
    document.getElementById("home").style.display = "none";
    document.getElementById("playerScreen").style.display = "block";
}

function voltarHome() {
    document.getElementById("home").style.display = "flex";
    document.getElementById("playerScreen").style.display = "none";
}

// PLAYER
function play(url) {
    const video = document.getElementById('video');

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// PARSE M3U
function parseM3U(text) {
    const linhas = text.split("\n");
    let lista = [];
    let canal = {};

    linhas.forEach(linha => {
        linha = linha.trim();

        if (linha.startsWith("#EXTINF")) {

            const nome = linha.split(",")[1];
            const grupo = (linha.match(/group-title="(.*?)"/) || [])[1] || "Canais";
            const logo = (linha.match(/tvg-logo="(.*?)"/) || [])[1] || "";

            canal = { nome, grupo, logo };

        } 
        else if (linha.startsWith("http")) {
            canal.url = linha;
            lista.push(canal);
        }
    });

    return lista;
}

// AGRUPAR
function agrupar(canais) {
    const grupos = {};

    canais.forEach(c => {
        if (!grupos[c.grupo]) grupos[c.grupo] = [];
        grupos[c.grupo].push(c);
    });

    return grupos;
}

// RENDER
function render(canais) {

    const sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = "";

    const grupos = agrupar(canais);

    Object.keys(grupos).forEach(nomeGrupo => {

        const titulo = document.createElement("div");
        titulo.className = "cat-titulo";
        titulo.innerText = "📂 " + nomeGrupo;

        const canaisDiv = document.createElement("div");
        canaisDiv.style.display = "none";

        titulo.onclick = () => {
            canaisDiv.style.display =
                canaisDiv.style.display === "block" ? "none" : "block";
        };

        grupos[nomeGrupo].forEach(c => {

            const div = document.createElement("div");
            div.className = "canal";

            div.innerHTML = `
                <img src="${c.logo || 'https://via.placeholder.com/40'}">
                <span>${c.nome}</span>
            `;

            div.onclick = () => play(c.url);

            canaisDiv.appendChild(div);
        });

        sidebar.appendChild(titulo);
        sidebar.appendChild(canaisDiv);
    });
}

// CONTROLE TV (clicar no player)
document.getElementById("video").addEventListener("click", () => {
    document.getElementById("sidebar").classList.toggle("hidden");
});

// CARREGAR LISTA
fetch(url)
.then(res => res.text())
.then(text => {
    const canais = parseM3U(text);
    render(canais);
})
.catch(() => {
    document.getElementById("sidebar").innerHTML = "Erro ao carregar lista";
});

</script>

</body>
</html>
