
<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IPTV Player</title><script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script><style>
body {
    background:#0f0f0f;
    color:#fff;
    font-family:Arial;
    margin:0;
}

header {
    background:#111;
    padding:15px;
    text-align:center;
    font-size:20px;
}

#lista {
    display:flex;
    flex-wrap:wrap;
    padding:10px;
}

.canal {
    background:#1c1c1c;
    margin:5px;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    width:180px;
    text-align:center;
}

.canal:hover {
    background:#333;
}

video {
    width:100%;
    height:300px;
    background:black;
}
</style></head><body><header>📺 IPTV Player Dropbox</header><video id="video" controls></video>

<div id="lista"></div><script>

// 🔥 SUA LISTA (COM PROXY)
const url = "https://api.allorigins.win/raw?url=http://newoneblue.site:80/player_api.php?username=Vanessa1234&password=Vanessa1234&type=m3u&output=m3u8";

// PLAYER
function play(url) {
    const video = document.getElementById('video');

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// CONVERTER M3U
function parseM3U(text) {
    const linhas = text.split("\n");
    let lista = [];
    let canal = {};

    linhas.forEach(linha => {
        linha = linha.trim();

        if (linha.startsWith("#EXTINF")) {
            const nome = linha.split(",")[1];
            canal = { nome: nome };
        } 
        else if (linha.startsWith("http")) {
            canal.url = linha;
            lista.push(canal);
        }
    });

    return lista;
}

// CARREGAR LISTA
fetch(url)
.then(res => res.text())
.then(text => {

    const canais = parseM3U(text);
    const listaDiv = document.getElementById("lista");

    canais.forEach(c => {
        const div = document.createElement("div");
        div.className = "canal";
        div.innerText = c.nome;

        div.onclick = () => play(c.url);

        listaDiv.appendChild(div);
    });

})
.catch(err => {
    document.body.innerHTML += "<p>Erro ao carregar lista</p>";
});

</script></body>
</html>
