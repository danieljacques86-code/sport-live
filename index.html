<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IPTV PRO UI</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0a2a5e;
    color:#fff;
}

/* HOME */
#home {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

/* LOGO */
.logo {
    font-size:40px;
    margin-bottom:40px;
}

/* MENU */
.menu {
    display:flex;
    gap:20px;
}

/* CARD */
.card {
    width:180px;
    height:120px;
    border:2px solid rgba(255,255,255,0.4);
    border-radius:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    background:rgba(255,255,255,0.1);
    transform:scale(1.05);
}

.card span {
    margin-top:10px;
}

/* PLAYER SCREEN */
#playerScreen {
    display:none;
    height:100vh;
}

/* LAYOUT TV */
.container {
    display:flex;
    height:100%;
}

/* SIDEBAR */
.sidebar {
    width:300px;
    background:#111;
    overflow-y:auto;
}

.player-area {
    flex:1;
}

video {
    width:100%;
    height:100%;
    background:black;
}

/* BOTÃO VOLTAR */
.voltar {
    position:absolute;
    top:10px;
    left:10px;
    background:#000;
    padding:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">

    <div class="logo">▶ IPTV PRO</div>

    <div class="menu">

        <div class="card" onclick="abrirLive()">
            📺
            <span>LIVE TV</span>
        </div>

        <div class="card">
            🧾
            <span>EPG</span>
        </div>

        <div class="card">
            🎬
            <span>VOD</span>
        </div>

        <div class="card">
            📺
            <span>SERIES</span>
        </div>

    </div>

</div>

<!-- PLAYER -->
<div id="playerScreen">

    <div class="voltar" onclick="voltarHome()">⬅ VOLTAR</div>

    <div class="container">
        <div class="sidebar" id="sidebar"></div>

        <div class="player-area">
            <video id="video" controls></video>
        </div>
    </div>

</div>

<script>

const url = "https://dl.dropbox.com/scl/fi/nln0qvhqwt6fx0b57zoy2/sportLive.txt?dl=0";

// NAV
function abrirLive() {
    document.getElementById("home").style.display = "none";
    document.getElementById("playerScreen").style.display = "block";
}

function voltarHome() {
    document.getElementById("home").style.display = "flex";
    document.getElementById("playerScreen").style.display = "none";
}

// PLAYER
function play(url) {
    const video = document.getElementById('video');

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// PARSE
function parseM3U(text) {
    const linhas = text.split("\n");
    let lista = [];
    let canal = {};

    linhas.forEach(linha => {
        linha = linha.trim();

        if (linha.startsWith("#EXTINF")) {
            const nome = linha.split(",")[1];
            canal = { nome };
        } 
        else if (linha.startsWith("http")) {
            canal.url = linha;
            lista.push(canal);
        }
    });

    return lista;
}

// RENDER
fetch(url)
.then(res => res.text())
.then(text => {
    const canais = parseM3U(text);
    const sidebar = document.getElementById("sidebar");

    canais.forEach(c => {
        const div = document.createElement("div");
        div.style.padding = "10px";
        div.style.cursor = "pointer";
        div.innerText = c.nome;

        div.onclick = () => play(c.url);

        sidebar.appendChild(div);
    });
});

</script>

</body>
</html>
